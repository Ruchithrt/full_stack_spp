services:
  kafka:
      image: confluentinc/cp-kafka:7.8.3
      container_name: kafka
      ports:
        - "9092:9092"
      environment:
        KAFKA_KRAFT_MODE: "true"
        CLUSTER_ID: "1Lqwr-ehH--86"
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      volumes:
        - kafka_kraft:/var/lib/kafka/data
      networks:
        - app-network
      healthcheck:                                      # ← add this
        test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
        interval: 10s
        timeout: 10s
        retries: 10
        start_period: 30s

  supplier-service:
    build: ./supplier-service
    ports:
      - "8001:8001"
    depends_on:
      kafka:
        condition: service_healthy                    # ← wait until kafka is actually ready
    volumes:
      - ./supplier-service/suppliers.db:/app/suppliers.db
    networks:
      - app-network

  product-service:
    build: ./product-service
    ports:
      - "8002:8002"
    depends_on:
      kafka:
        condition: service_healthy                    # ← wait until kafka is actually ready
    volumes:
      - ./product-service/products.db:/app/products.db
    networks:
      - app-network

  audit-service:
    build: ./audit-service
    depends_on:
      kafka:
        condition: service_healthy                    # ← wait until kafka is actually ready
    networks:
      - app-network
    volumes:
      - ./audit-service/audit.log:/app/audit.log 

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - supplier-service
      - product-service
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  kafka_kraft: